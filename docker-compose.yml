version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: parkflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: parkflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parkflow-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://postgres:postgrespassword@postgres:5432/parkflow_db?schema=public"
      PORT: 3001
      JWT_SECRET: "super-secret-key-change-in-production"
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parkflow-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
